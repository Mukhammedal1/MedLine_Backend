name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            docker stop nestjs-app || true
            docker rm nestjs-app || true

            docker network create medline-network || true

            docker stop medline-db || true
            docker rm medline-db || true

            docker run -d \
            --name medline-db \
            --network medline-network \
            --restart always \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=ali18022002 \
            -e POSTGRES_DB=medline \
            -v prod_pgdata:/var/lib/postgresql/data \
            postgres:15-alpine

            docker pull ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest

            docker run -d \
            --name nestjs-app \
            --network medline-network \
            --restart always \
            --env-file /root/medline.env \
            -p 3001:3000 \
            ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest
