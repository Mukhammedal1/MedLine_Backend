services:
  app:
    image: ghcr.io/Mukhammedal1/MedLine_Backend:${TAG:-latest}
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data

volumes:
  prod_pgdata:
  uploads_data:
